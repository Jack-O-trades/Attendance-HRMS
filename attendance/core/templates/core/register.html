<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — EduTrack</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px; }
        .box { background: white; padding: 28px 36px; border: 1px solid #ccc; border-radius: 6px; width: 100%; max-width: 420px; }
        .box h2 { text-align: center; margin-bottom: 6px; color: #1b3a6b; }
        .box p { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; margin-top: 12px; }
        input, select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        #reg-number-row { display: none; }
        .msg-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
        .msg-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
        button[type="submit"] { width: 100%; padding: 9px; background: #1b3a6b; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 16px; }
        button[type="submit"]:hover { background: #1e56a0; }
        .login-link { text-align: center; margin-top: 14px; font-size: 13px; color: #666; }
        .login-link a { color: #1b3a6b; font-weight: bold; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .box { padding: 20px 16px; }
        }
    </style>
</head>
<body>
<div class="box">
    <h2>🏫 EduTrack</h2>
    <p>Student Attendance System</p>

    {% if messages %}
        {% for message in messages %}
        <div class="{% if message.tags == 'error' %}msg-error{% else %}msg-success{% endif %}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label for="role">Register As</label>
        <select name="role" id="role" required onchange="toggleRegNo(this.value)">
            <option value="">— Select Role —</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>

        <label>First Name</label>
        <input type="text" name="first_name" placeholder="First name" required>

        <label>Last Name</label>
        <input type="text" name="last_name" placeholder="Last name" required>

        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a username" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Email (optional)">

        <label>Phone</label>
        <input type="text" name="phone" placeholder="Phone number (optional)">

        <div id="reg-number-row">
            <label>Registration Number</label>
            <input type="text" name="registration_number" id="reg_no" placeholder="e.g. REG2024001">
        </div>

        <label>Password</label>
        <input type="password" name="password" placeholder="Create password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>

        <button type="submit">Submit Registration</button>
    </form>

    <div class="login-link">
        Already registered? <a href="{% url 'login' %}">Login here</a>
    </div>
</div>

<script>
    function toggleRegNo(role) {
        var row = document.getElementById('reg-number-row');
        var regInput = document.getElementById('reg_no');
        if (role === 'student') {
            row.style.display = 'block';
            regInput.required = true;
        } else {
            row.style.display = 'none';
            regInput.required = false;
        }
    }
</script>
</body>
</html>
